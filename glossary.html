function highlight(text,q){
  if(!q)return escapeHtml(text);
  var re=new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return escapeHtml(text).replace(re,"<mark>$1</mark>");
}

      html+='<div class="g-term-content'+(isOpen?" open":"")+'">';
      if(t.imageUrl)html+='<div class="g-img-wrap"><img class="g-img" src="'+t.imageUrl+'" alt="'+escapeHtml(t.term)+'"></div>';
      html+='<p class="g-def">'+highlight(t.def,q)+'</p>';
      if(t.detail)html+='<p class="g-detail">'+highlight(t.detail,q)+'</p>';
      if(t.linkLabel&&t.linkUrl)html+='<a href="'+escapeHtml(t.linkUrl)+'" target="_blank" rel="noopener" class="g-link">'+escapeHtml(t.linkLabel)+'<svg class="g-link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a>';
      html+='</div></div>';
    }else{
      html+='<div class="g-term g-card" id="'+id+'-term-'+t.id+'">';
      if(t.imageUrl)html+='<div class="g-img-wrap"><img class="g-img" src="'+t.imageUrl+'" alt="'+escapeHtml(t.term)+'"></div>';
      html+='<div class="g-card-title">'+highlight(t.term,q)+'</div>';
      html+='<p class="g-def">'+highlight(t.def,q)+'</p>';
      if(t.detail)html+='<p class="g-detail">'+highlight(t.detail,q)+'</p>';
      if(t.linkLabel&&t.linkUrl)html+='<a href="'+escapeHtml(t.linkUrl)+'" target="_blank" rel="noopener" class="g-link">'+escapeHtml(t.linkLabel)+'<svg class="g-link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a>';
      html+='</div>';
    }
  });
  termsEl.innerHTML=html;
  if(style==="accordion"){
    termsEl.querySelectorAll(".g-term-btn").forEach(function(btn){
      btn.addEventListener("click",function(){
        var tid=btn.getAttribute("data-id");
        expanded[tid]=!expanded[tid];
        render(searchEl?searchEl.value:"");
      });
      btn.addEventListener("keydown",function(e){
        if(e.key==="Enter"||e.key===" "){e.preventDefault();btn.click();}
      });
    });
  }
}

function buildAZ(){
  if(!azEl)return;
  var letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  var available={};
  terms.forEach(function(t){if(t.term[0])available[t.term[0].toUpperCase()]=true;});
  azEl.innerHTML=letters.map(function(l){
    var disabled=!available[l];
    return '<button class="g-az-btn'+(disabled?'" disabled':'"')+' data-letter="'+l+'">'+l+'</button>';
  }).join("");
  azEl.querySelectorAll(".g-az-btn:not([disabled])").forEach(function(btn){
    btn.addEventListener("click",function(){
      azEl.querySelectorAll(".g-az-btn").forEach(function(b){b.classList.remove("active");});
      btn.classList.add("active");
      var letter=btn.getAttribute("data-letter");
      var first=terms.find(function(t){return t.term[0]&&t.term[0].toUpperCase()===letter;});
      if(first){
        var el=document.getElementById(id+"-term-"+first.id);
        if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
      }
    });
  });
}

if(searchEl){
  searchEl.addEventListener("input",function(){render(searchEl.value);});
}
if(expandBtn){
  expandBtn.addEventListener("click",function(){
    terms.forEach(function(t){expanded[t.id]=true;});
    render(searchEl?searchEl.value:"");
  });
}
if(collapseBtn){
  collapseBtn.addEventListener("click",function(){
    expanded={};
    render(searchEl?searchEl.value:"");
  });
}

buildAZ();
render("");
})();
</script>
</body>
</html>
