
<style>
#ed_reflect_5u3dwk59{font-family:'Poppins',sans-serif;font-size:22.5px;color:#3c4f77;background:#b0e6ea;padding:40px;max-width:960px;margin:0 auto;box-sizing:border-box}
#ed_reflect_5u3dwk59 .ed_title{font-family:'Cantarell',sans-serif;font-size:36px;font-weight:700;margin-bottom:20px;text-align:center;color:#A00056}
#ed_reflect_5u3dwk59 .ed_q{margin-bottom:25px}
#ed_reflect_5u3dwk59 .ed_label{display:block;font-weight:600;margin-bottom:10px;font-size:20.25px}
#ed_reflect_5u3dwk59 .ed_ta{width:100%;min-height:200px;padding:15px;border:2px solid rgba(0,0,0,0.12);border-radius:8px;font-family:'Poppins',sans-serif;font-size:19.125px;resize:vertical;transition:border-color 0.2s;box-sizing:border-box}
#ed_reflect_5u3dwk59 .ed_ta:focus{outline:none;border-color:#A00056}
#ed_reflect_5u3dwk59 .ed_error{color:#58709D;font-size:15px;margin-top:4px}
#ed_reflect_5u3dwk59 .ed_dl{text-align:center;margin-top:30px}
#ed_reflect_5u3dwk59 .ed_btn{display:inline-block;padding:15px 35px;background:#A00056;color:#fff;border:none;border-radius:8px;font-family:'Poppins',sans-serif;font-size:19.125px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
#ed_reflect_5u3dwk59 .ed_btn:hover{opacity:0.85}
#ed_reflect_5u3dwk59 .ed_hint{font-size:16.25px;margin-top:8px;text-align:center}
#ed_reflect_5u3dwk59 .ed_successmsg{display:none;margin-top:12px;padding:15px;background:#A00056;border-radius:8px;font-size:17.5px;text-align:center;color:#ffffff;font-weight:600}
</style>

<link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<div id="ed_reflect_5u3dwk59">
  <div class="ed_title">Pause Before You Respond”</div>
  <div id="ed_reflect_5u3dwk59_qs"></div>

  <div class="ed_dl">
    <button class="ed_btn" id="ed_reflect_5u3dwk59_submit">
      SUBMIT
    </button>
    <div class="ed_hint" id="ed_reflect_5u3dwk59_hint"></div>
    <div class="ed_successmsg" id="ed_reflect_5u3dwk59_success">Your response has been submitted.</div>
  </div>

  <div style="text-align:center;margin-top:16px;font-size:12px;opacity:0.6;">Built by eLearningDesign.org</div>
</div>

<script>
(function() {
  var blockId = "ed_reflect_5u3dwk59";
  var storageKey = "ed_reflect_5u3dwk59_answers";
  var questions = [{"id":"0wwdbr1p","prompt":"Think of a recent moment where you reacted too quickly in a conversation or email.","hint":"What happened, and what triggered your immediate reaction?","minChars":25},{"id":"rtwbeu6v","prompt":"If you could pause and respond again, what would you do differently?","hint":"Rewrite your response in a calmer, more intentional way.","minChars":0}];
  var _memAnswers = {};

  function $(id) { return document.getElementById(id); }

  function loadAnswers() {
    try {
      var raw = localStorage.getItem(storageKey);
      if (!raw) return _memAnswers;
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") return _memAnswers;
      return parsed;
    } catch (e) { return _memAnswers; }
  }

  function saveAnswers(obj) {
    _memAnswers = obj || {};
    try { localStorage.setItem(storageKey, JSON.stringify(_memAnswers)); } catch (e) {}
  }

  function validateOne(q, value, errEl) {
    if (!q || !errEl) return true;
    var min = Number(q.minChars || 0);
    if (!min) { errEl.style.display = "none"; errEl.textContent = ""; return true; }
    var len = (value || "").trim().length;
    if (len >= min) { errEl.style.display = "none"; errEl.textContent = ""; return true; }
    errEl.style.display = "block";
    errEl.textContent = "Please write at least " + min + " characters.";
    return false;
  }

  function validateAll() {
    var ok = true;
    var answers = loadAnswers();
    questions.forEach(function(q) {
      var min = Number(q.minChars || 0);
      if (!min) return;
      var len = (answers[q.id] || "").trim().length;
      if (len < min) ok = false;
    });
    return ok;
  }

  function render() {
    var container = $(""+blockId+"_qs");
    if (!container) return;
    var answers = loadAnswers();
    container.innerHTML = "";

    questions.forEach(function(q) {
      var wrap = document.createElement("div");
      wrap.className = "ed_q";

      var label = document.createElement("label");
      label.className = "ed_label";
      label.textContent = q.prompt || "";

      var ta = document.createElement("textarea");
      ta.className = "ed_ta";
      ta.placeholder = q.hint || "";
      ta.value = answers[q.id] || "";

      var err = document.createElement("div");
      err.className = "ed_error";
      err.style.display = "none";

      ta.addEventListener("input", function() {
        var a = loadAnswers();
        a[q.id] = ta.value;
        saveAnswers(a);
        validateOne(q, ta.value, err);
      });

      wrap.appendChild(label);
      wrap.appendChild(ta);
      wrap.appendChild(err);
      container.appendChild(wrap);

      validateOne(q, ta.value, err);
    });
  }

  function setHint(msg) {
    var h = $(""+blockId+"_hint");
    if (!h) return;
    h.textContent = msg || "";
  }

  function sendToLMS() {
    try {
      var api = window.API_1484_11 || window.API;
      if (api) {
        if (api.SetValue) {
          api.SetValue("cmi.completion_status", "completed");
          api.SetValue("cmi.success_status", "passed");
          api.Commit("");
        } else if (api.LMSSetValue) {
          api.LMSSetValue("cmi.core.lesson_status", "completed");
          api.LMSCommit("");
        }
      }
    } catch (e) { /* LMS not available */ }
  }

  function resetBlock() {
    saveAnswers({});
    try { localStorage.removeItem(storageKey); } catch (e) {}
    render();
    var successEl = $(""+blockId+"_success");
    if (successEl) successEl.style.display = "none";
    var btnEl = $(""+blockId+"_submit");
    if (btnEl) { btnEl.style.display = "inline-block"; }
    setHint("");
  }

  function handleSubmit() {
    if (!validateAll()) {
      setHint("Complete the required reflections before submitting.");
      return;
    }
    setHint("");
    sendToLMS();
    var successEl = $(""+blockId+"_success");
    if (successEl) successEl.style.display = "block";
    var btnEl = $(""+blockId+"_submit");
    if (btnEl) { btnEl.style.display = "none"; }
    setTimeout(resetBlock, 5000);
  }

  function init() {
    render();
    var btn = $(""+blockId+"_submit");
    if (btn) btn.addEventListener("click", handleSubmit);
  }

  init();
})();
</script>
