<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting or Email?</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#f4e7ec;padding:24px}
.title{text-align:center;font-size:35px;font-weight:700;color:undefined;margin-bottom:4px}
.instruction{text-align:center;font-size:undefinedpx;color:undefined;margin-bottom:4px}
.item-count{text-align:center;font-size:13px;color:#999;margin-bottom:16px}
.lanes{display:grid;grid-template-columns:repeat(2,1fr);gap:23px}
@media(max-width:500px){.lanes{grid-template-columns:1fr}}
.lane-header{padding:10px 14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;border-radius:15px 15px 0 0}
.lane-header.filled{color:#fff}
.lane-header.outlined{background:#fff}
.lane-header.minimal{background:transparent;border-radius:0}
.drop-zone{min-height:150px;padding:8px;display:flex;flex-direction:column;gap:6px;border-radius:0 0 15px 15px}
.drop-zone.empty{border-style:dashed !important}
.placeholder{color:#bbb;font-size:13px;text-align:center;margin-top:60px}
.pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px;padding:16px;background:#f8f8f8;border-radius:15px;border:1px solid #E5E5EA}
.item{font-size:18px;padding:8px 14px;border-radius:15px;background:#fff;border:1px solid #E5E5EA;color:#222;cursor:grab;user-select:none;transition:all .2s}
.item.placed{cursor:default}
.item.correct{cursor:default}
.btn{background:#A00056;color:#fff;border:none;padding:10px 28px;border-radius:6px;font-weight:600;cursor:pointer;font-family:inherit;font-size:15px;margin-top:16px}
.btn:hover{background:#800045}
.completion{margin-top:16px;padding:14px 20px;background:rgba(173,225,198,.2);border:1px solid #ADE1C6;border-radius:8px;text-align:center;color:#222;font-weight:500}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease}
</style>
</head>
<body>
<div class="title">Meeting or Email?</div>
<div class="instruction">Drag each scenario to the correct lane</div>
<div class="item-count" id="counter"></div>
<div class="lanes" id="lanes"></div>
<div class="pool" id="pool"></div>
<div id="actions" style="text-align:center"></div>
<div id="score" style="text-align:center;margin-top:16px;display:none"></div>
<div class="completion" id="completion" style="display:none">Great job! All items sorted correctly.</div>
<script>
(function(){
var lanes=[{"id":"30c9ada2-3328-4cd8-a587-32600ca4199d","label":"Schedule a meeting","color":"#007482","icon":"clipboard"},{"id":"e1a3625d-7ddd-4331-b063-65d0b67b74c8","label":"Just send an email","color":"#a00056","icon":"tag"}];
var allItems=[{"id":"9a0bdc78-2ea2-4fa4-9631-e178704bca9e","text":"Brainstorming new ideas","laneId":"30c9ada2-3328-4cd8-a587-32600ca4199d"},{"id":"ddb63e9a-a13b-400e-b3cd-d7875307701e","text":"Resolving a team conflict","laneId":"30c9ada2-3328-4cd8-a587-32600ca4199d"},{"id":"bab0f41d-9693-48d6-8332-90907e25d579","text":"Quarterly project review","laneId":"30c9ada2-3328-4cd8-a587-32600ca4199d"},{"id":"543ab8d8-519e-44a6-b8f8-861470a632b8","text":"Onboarding a new hire","laneId":"30c9ada2-3328-4cd8-a587-32600ca4199d"},{"id":"6e7bedd6-ce64-4a05-98d1-48d1ebff019c","text":"Sharing a status update","laneId":"e1a3625d-7ddd-4331-b063-65d0b67b74c8"},{"id":"28de8f8c-1a4e-46b4-93ff-7350677dbbbf","text":"Distributing meeting notes","laneId":"e1a3625d-7ddd-4331-b063-65d0b67b74c8"},{"id":"ea5fe6e8-f11d-45c6-9615-2e2f8ff932f9","text":"Requesting a file or link","laneId":"e1a3625d-7ddd-4331-b063-65d0b67b74c8"}];
var settings={"shuffle":true,"feedbackMode":"instant","showItemCount":true,"allowRetry":true,"completionMessage":"Great job! All items sorted correctly.","scorecardTitle":"Results"};
var design={"cornerRadius":15,"laneHeaderStyle":"filled","showLaneIcons":true};

var pool=[...allItems];
if(settings.shuffle){for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t}}
var placements={};
lanes.forEach(function(l){placements[l.id]=[]});
var checked=false;
var dragId=null;

function hexToRgb(h){h=h.replace('#','');return[parseInt(h.substring(0,2),16),parseInt(h.substring(2,4),16),parseInt(h.substring(4,6),16)]}
function tint(c){var r=hexToRgb(c);return 'rgba('+r[0]+','+r[1]+','+r[2]+',0.15)'}
function darkText(c){var r=hexToRgb(c);var tr=Math.round(255+(r[0]-255)*0.15);var tg=Math.round(255+(r[1]-255)*0.15);var tb=Math.round(255+(r[2]-255)*0.15);var l=(0.299*tr+0.587*tg+0.114*tb)/255;return l>0.5?'#000':'#fff'}
function borderC(c,o){var r=hexToRgb(c);return 'rgba('+r[0]+','+r[1]+','+r[2]+','+(o||.3)+')'}

function getIconSvg(name){
var icons={"checkmark":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 8.5L7 11.5L12 5\"/></svg>","x-mark":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 4L12 12M12 4L4 12\"/></svg>","clipboard":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"3\" width=\"8\" height=\"11\" rx=\"1\"/><path d=\"M6 3V2a2 2 0 014 0v1\"/></svg>","refresh-arrows":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 8a6 6 0 0110.5-4M14 8a6 6 0 01-10.5 4\"/><path d=\"M12.5 1v3h-3M3.5 15v-3h3\"/></svg>","tag":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 4l5-2h7v7l-2 5-10-10z\"/><circle cx=\"11\" cy=\"5\" r=\"1\"/></svg>","truck":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"1\" y=\"6\" width=\"9\" height=\"6\" rx=\"1\"/><path d=\"M10 8h3l2 3v1h-5\"/><circle cx=\"4\" cy=\"13\" r=\"1.5\"/><circle cx=\"13\" cy=\"13\" r=\"1.5\"/></svg>","star":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 2l1.8 3.6L14 6.3l-3 2.9.7 4.1L8 11.2 4.3 13.3l.7-4.1-3-2.9 4.2-.7z\"/></svg>","lightbulb":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 1a5 5 0 013 9v2H5v-2A5 5 0 018 1z\"/><path d=\"M6 14h4\"/></svg>","flag":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 2v12\"/><path d=\"M3 2h8l-2 3 2 3H3\"/></svg>","heart":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 14s-6-4.35-6-8a3.5 3.5 0 017-1 3.5 3.5 0 017 1c0 3.65-6 8-6 8z\"/></svg>","thumbs-up":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 14V7l3-5 1 3h4a2 2 0 012 2v5a2 2 0 01-2 2H5z\"/><path d=\"M5 7H3a1 1 0 00-1 1v5a1 1 0 001 1h2\"/></svg>","thumbs-down":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"transform:scaleY(-1)\"><path d=\"M5 14V7l3-5 1 3h4a2 2 0 012 2v5a2 2 0 01-2 2H5z\"/><path d=\"M5 7H3a1 1 0 00-1 1v5a1 1 0 001 1h2\"/></svg>","lock":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"8\" width=\"8\" height=\"6\" rx=\"1\"/><path d=\"M6 8V5a2 2 0 014 0v3\"/></svg>","unlock":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"8\" width=\"8\" height=\"6\" rx=\"1\"/><path d=\"M6 8V5a2 2 0 014 0\"/></svg>","shield":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 1L2 4v4c0 4 3 7 6 8 3-1 6-4 6-8V4z\"/></svg>","warning-triangle":"<svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 2L1 14h14z\"/><path d=\"M8 6v4\"/><circle cx=\"8\" cy=\"12\" r=\".5\"/></svg>"};
return icons[name]||'';
}

function render(){
var lanesEl=document.getElementById('lanes');
lanesEl.innerHTML='';
lanes.forEach(function(lane){
var col=document.createElement('div');
var hdr=document.createElement('div');
hdr.className='lane-header '+design.laneHeaderStyle;
if(design.laneHeaderStyle==='filled'){hdr.style.backgroundColor=lane.color;hdr.style.color='#fff'}
else if(design.laneHeaderStyle==='outlined'){hdr.style.border='2px solid '+lane.color;hdr.style.color=lane.color}
else{hdr.style.color=lane.color;hdr.style.borderBottom='2px solid '+lane.color}
if(design.showLaneIcons){hdr.innerHTML=getIconSvg(lane.icon)+' '}
hdr.innerHTML+=lane.label;
col.appendChild(hdr);

var dz=document.createElement('div');
dz.className='drop-zone'+(placements[lane.id].length===0?' empty':'');
dz.style.border=(placements[lane.id].length===0?'2px dashed ':'1px solid ')+borderC(lane.color,placements[lane.id].length===0?.3:.15);
dz.style.backgroundColor=tint(lane.color);
dz.ondragover=function(e){e.preventDefault()};
dz.ondrop=function(){handleDrop(lane.id)};
dz.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});

if(placements[lane.id].length===0){
var ph=document.createElement('div');ph.className='placeholder';ph.textContent='Drop here';dz.appendChild(ph)}
placements[lane.id].forEach(function(item){
var el=createItemEl(item,lane);
dz.appendChild(el)});
col.appendChild(dz);
lanesEl.appendChild(col)});

var poolEl=document.getElementById('pool');
poolEl.innerHTML='';
poolEl.style.display=pool.length?'flex':'none';
pool.forEach(function(item){
var el=createItemEl(item);
poolEl.appendChild(el)});

if(settings.showItemCount){
var pc=Object.values(placements).reduce(function(s,a){return s+a.length},0);
document.getElementById('counter').textContent=pc+' of '+allItems.length+' items placed'}

var actEl=document.getElementById('actions');
actEl.innerHTML='';
if(settings.feedbackMode==='submitReveal'&&!checked){
var pc2=Object.values(placements).reduce(function(s,a){return s+a.length},0);
if(pc2>0){var btn=document.createElement('button');btn.className='btn';btn.textContent='Check answers';btn.onclick=checkAnswers;actEl.appendChild(btn)}}

var cc=0;Object.entries(placements).forEach(function(e){e[1].forEach(function(i){if(i.laneId===e[0])cc++})});
var scoreEl=document.getElementById('score');
if(checked){scoreEl.style.display='block';scoreEl.innerHTML='<div style="font-weight:600;font-size:18px;color:#222">'+settings.scorecardTitle+'</div><div style="color:#666;margin-top:4px">'+cc+' of '+allItems.length+' correct</div>';
if(settings.allowRetry){var rb=document.createElement('button');rb.className='btn';rb.textContent='Try again';rb.onclick=retry;scoreEl.appendChild(rb)}}
else{scoreEl.style.display='none'}

var compEl=document.getElementById('completion');
var allPlaced=Object.values(placements).reduce(function(s,a){return s+a.length},0)===allItems.length;
compEl.style.display=(allPlaced&&cc===allItems.length)?'block':'none';
}

function createItemEl(item,lane){
var el=document.createElement('div');
el.className='item';el.textContent=item.text;
el.draggable=true;
el.ondragstart=function(){dragId=item.id};
// Touch support
var touchStartX,touchStartY,ghost;
el.addEventListener('touchstart',function(e){
dragId=item.id;
var t=e.touches[0];touchStartX=t.clientX;touchStartY=t.clientY;
ghost=el.cloneNode(true);ghost.style.position='fixed';ghost.style.opacity='.7';ghost.style.pointerEvents='none';ghost.style.zIndex='9999';
ghost.style.width=el.offsetWidth+'px';
document.body.appendChild(ghost)});
el.addEventListener('touchmove',function(e){
e.preventDefault();
var t=e.touches[0];
if(ghost){ghost.style.left=t.clientX-40+'px';ghost.style.top=t.clientY-20+'px'}},{passive:false});
el.addEventListener('touchend',function(e){
if(ghost){ghost.remove();ghost=null}
var t=e.changedTouches[0];
var target=document.elementFromPoint(t.clientX,t.clientY);
if(target){var dz=target.closest('.drop-zone');
if(dz){var idx=Array.from(document.querySelectorAll('.drop-zone')).indexOf(dz);
if(idx>=0)handleDrop(lanes[idx].id)}}
dragId=null});

if(lane){
var isCorrect=item.laneId===lane.id;
if(settings.feedbackMode==='instant'||(checked&&isCorrect)){
el.style.backgroundColor=tint(lane.color);el.style.border='1px solid '+lane.color;el.style.color=darkText(lane.color);el.className+=' correct'}
else if(checked&&!isCorrect){el.style.backgroundColor='rgba(195,32,50,.1)';el.style.border='1px solid #C32032';el.style.color='#C32032'}
if(checked){el.textContent+=(isCorrect?' ✓':' ✗');el.draggable=false}
if(settings.feedbackMode==='instant'){el.draggable=false}}
return el}

function handleDrop(targetLaneId){
if(!dragId)return;
var item=pool.find(function(i){return i.id===dragId});
if(!item){Object.values(placements).forEach(function(arr){var f=arr.find(function(i){return i.id===dragId});if(f)item=f})}
if(!item)return;
if(settings.feedbackMode==='instant'){
if(item.laneId===targetLaneId){pool=pool.filter(function(i){return i.id!==item.id});placements[targetLaneId].push(item)}
else{var el=document.querySelector('[draggable]');if(el){el.classList.add('shake');setTimeout(function(){el.classList.remove('shake')},400)}}}
else{pool=pool.filter(function(i){return i.id!==item.id});
Object.keys(placements).forEach(function(k){placements[k]=placements[k].filter(function(i){return i.id!==item.id})});
placements[targetLaneId].push(item)}
dragId=null;render()}

function checkAnswers(){checked=true;render()}
function retry(){pool=[...allItems];if(settings.shuffle){for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t}}
lanes.forEach(function(l){placements[l.id]=[]});checked=false;render()}

render();
})();
function reportHeight(){var h=document.documentElement.scrollHeight;window.parent.postMessage({type:'resize',height:h},'*')}
window.addEventListener('load',reportHeight);new ResizeObserver(reportHeight).observe(document.body);
</script>
</body>
</html>
