<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matching Pair Game</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: DM Sans, sans-serif; }
    .game-container { max-width: 900px; width: 100%; margin: 0 auto; padding: 24px; position: relative; }
    #confetti-canvas { position: absolute; inset: 0; pointer-events: none; width: 100%; height: 100%; }
    .game-title { 
      font-family: Montserrat, sans-serif; 
      font-size: 39px; 
      font-weight: bold; 
      text-align: center; 
      margin-bottom: 24px; 
      color: #a10256; 
    }
    .game-grid { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 24px; 
      justify-content: center; 
      margin: 0 auto; 
    }
    @media (max-width: 980px) {
      .game-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .game-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .game-card { 
      aspect-ratio: 1;
      padding: 0;
      background-color: #3B82F6;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .game-card:hover:not(:disabled) { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .game-card.flipped { background-color: #3B82F6; color: #FEFEFE; }
    .game-card.matched { opacity: 0.9; cursor: not-allowed; }
    .game-card.matched::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      box-shadow: inset 0 0 30px #3B82F6, 0 0 20px #3B82F6;
      opacity: 0.6;
      animation: pulse 2s infinite;
    }
    .card-content { 
      position: absolute; 
      inset: 0; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 0; 
      text-align: center;
      word-wrap: break-word;
      font-weight: 600;
      line-height: 1.2;
    }
    .card-content.back-text {
      overflow: visible !important;
      text-overflow: clip !important;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0;
    }
    .card-content.back-text span {
      line-height: 1.2;
      font-weight: 700;
      text-align: center;
      word-break: break-word;
    }
    .card-content img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.8; } }
    .reset-btn { 
      margin-top: 20px; 
      margin-left: auto;
      margin-right: auto;
      display: block;
      width: 80%; 
      max-width: 720px;
      padding: 8px 16px; 
      background-color: #3B82F6; 
      color: #ffffff; 
      border: none; 
      border-radius: 8px; 
      font-weight: 500; 
      cursor: pointer; 
      transition: opacity 0.3s;
    }
    .reset-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

    <button class="reset-btn" onclick="initGame()">Reset Game</button>

    const BLOCK_SIZE = "large";
    let cards = [];
    let flippedCards = [];
    let isChecking = false;
    let myConfetti = null;
    let maxTextLength = 0;
    
    function getCardBackFontSize() {
      const textLength = CARD_BACK.content.length;
      
      // Base font size multipliers for each card size
      const sizeMultipliers = { small: 0.7, medium: 1.0, large: 1.3 };
      const multiplier = sizeMultipliers[BLOCK_SIZE];
      
      // Calculate font size based on text length, then scale by card size
      let baseFontSize;
      if (textLength <= 1) baseFontSize = { min: 60, vw: 25, max: 140 };
      else if (textLength <= 3) baseFontSize = { min: 50, vw: 20, max: 120 };
      else if (textLength <= 5) baseFontSize = { min: 44, vw: 18, max: 110 };
      else if (textLength <= 10) baseFontSize = { min: 38, vw: 15, max: 95 };
      else if (textLength <= 20) baseFontSize = { min: 28, vw: 12, max: 75 };
      else if (textLength <= 30) baseFontSize = { min: 24, vw: 10, max: 58 };
      else if (textLength <= 50) baseFontSize = { min: 20, vw: 8, max: 48 };
      else baseFontSize = { min: 16, vw: 6, max: 38 };
      
      return `clamp(${baseFontSize.min * multiplier}px, ${baseFontSize.vw * multiplier}vw, ${baseFontSize.max * multiplier}px)`;
    }
    
    function calculateMaxTextLength() {
      maxTextLength = 0;
      PAIRS.forEach(pair => {
        if (pair.content1Type === 'text') {
          maxTextLength = Math.max(maxTextLength, pair.content1.length);
        }
        if (pair.content2Type === 'text') {
          maxTextLength = Math.max(maxTextLength, pair.content2.length);
        }
      });
    }
    
    function getCardSize() {
      // Base sizes for each blockSize option
      const baseSizes = {
        small: { base: 100, vw: 10, max: 120 },
        medium: { base: 130, vw: 13, max: 160 },
        large: { base: 160, vw: 16, max: 200 }
      };
      
      const size = baseSizes[BLOCK_SIZE];
      
      // Adjust based on text length - cards grow slightly for longer content
      let sizeMultiplier = 1;
      if (maxTextLength > 50) sizeMultiplier = 1.15;
      else if (maxTextLength > 35) sizeMultiplier = 1.1;
      else if (maxTextLength > 20) sizeMultiplier = 1.05;
      
      const width = `clamp(${size.base * sizeMultiplier}px, ${size.vw * sizeMultiplier}vw, ${size.max * sizeMultiplier}px)`;
      const height = width;
      
      return { width, height };
    }
    
    function getTextStyle() {
      // Base font size multipliers for each card size
      const sizeMultipliers = { small: 0.75, medium: 1.0, large: 1.25 };
      const multiplier = sizeMultipliers[BLOCK_SIZE];
      
      let baseFontSize;
      if (maxTextLength <= 20) {
        baseFontSize = { min: 14, vw: 2.5, max: 18 };
      } else if (maxTextLength <= 35) {
        baseFontSize = { min: 12, vw: 2.2, max: 16 };
      } else if (maxTextLength <= 50) {
        baseFontSize = { min: 11, vw: 2, max: 15 };
      } else if (maxTextLength <= 75) {
        baseFontSize = { min: 10, vw: 1.8, max: 14 };
      } else {
        baseFontSize = { min: 9, vw: 1.6, max: 13 };
      }
      
      return `clamp(${baseFontSize.min * multiplier}px, ${baseFontSize.vw * multiplier}vw, ${baseFontSize.max * multiplier}px)`;
    }

    function initConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      myConfetti = confetti.create(canvas, {
        resize: true,
        useWorker: true
      });
    }
    
    function triggerConfetti() {
      if (!myConfetti) return;
      const duration = 5000;
      const animationEnd = Date.now() + duration;
      
      // Calculate confetti size based on card size
      const confettiScalar = BLOCK_SIZE === 'small' ? 1.2 : BLOCK_SIZE === 'medium' ? 1.8 : 2.5;
      const defaults = { startVelocity: 20, spread: 360, ticks: 100, zIndex: 0, scalar: confettiScalar };
      
      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }
      
      const interval = setInterval(function() {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);
        
        const particleCount = 50 * (timeLeft / duration);
        myConfetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
        myConfetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
      }, 350);
    }
    
    function initGame() {
      cards = [];
      PAIRS.forEach((pair, pairId) => {
        cards.push(
          { id: pairId * 2, content: pair.content1, contentType: pair.content1Type, pairId, isFlipped: false, isMatched: false },
          { id: pairId * 2 + 1, content: pair.content2, contentType: pair.content2Type, pairId, isFlipped: false, isMatched: false }
        );
      });
      
      // Shuffle
      for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      
      flippedCards = [];
      isChecking = false;
      renderGame();
    }
    
    function renderGame() {
      const grid = document.getElementById('gameGrid');
      const cardSize = getCardSize();
      const textStyle = getTextStyle();
      
      grid.innerHTML = cards.map(card => {
        const isVisible = card.isFlipped || card.isMatched;
        let content, contentClass, textStyleAttr = '';
        
        if (isVisible) {
          if (card.contentType === 'image') {
            content = `<img src="${card.content}" alt="Card" />`;
            contentClass = 'card-content';
          } else {
            content = card.content;
            contentClass = 'card-content text-content';
            textStyleAttr = `style="font-size: ${textStyle}; font-weight: 600; line-height: 1.2;"`;
          }
        } else {
          if (CARD_BACK.type === 'image') {
            content = `<img src="${CARD_BACK.content}" alt="Card back" />`;
            contentClass = 'card-content';
          } else {
            const fontSize = getCardBackFontSize();
            content = `<span style="font-size: ${fontSize};">${CARD_BACK.content}</span>`;
            contentClass = 'card-content back-text';
          }
        }
        
        return `<button class="game-card ${card.isFlipped ? 'flipped' : ''} ${card.isMatched ? 'matched' : ''}" 
                 onclick="handleCardClick(${card.id})" 
                 style="width: ${cardSize.width}; height: ${cardSize.height};"
                 ${card.isMatched ? 'disabled' : ''}>
          <div class="${contentClass}" ${textStyleAttr}>
            ${content}
          </div>
        </button>`;
      }).join('');
      
      // Check if all matched
      if (cards.length > 0 && cards.every(c => c.isMatched)) {
        setTimeout(triggerConfetti, 300);
      }
    }
    
    function handleCardClick(cardId) {
      if (isChecking || flippedCards.length >= 2) return;
      const card = cards.find(c => c.id === cardId);
      if (!card || card.isFlipped || card.isMatched) return;
      
      flippedCards.push(cardId);
      card.isFlipped = true;
      renderGame();
      
      if (flippedCards.length === 2) {
        isChecking = true;
        const [first, second] = flippedCards;
        const firstCard = cards.find(c => c.id === first);
        const secondCard = cards.find(c => c.id === second);
        
        if (firstCard.pairId === secondCard.pairId) {
          setTimeout(() => {
            firstCard.isMatched = true;
            secondCard.isMatched = true;
            flippedCards = [];
            isChecking = false;
            renderGame();
          }, 600);
        } else {
          setTimeout(() => {
            firstCard.isFlipped = false;
            secondCard.isFlipped = false;
            flippedCards = [];
            isChecking = false;
            renderGame();
          }, 1000);
        }
      }
    }
    
    calculateMaxTextLength();
    initConfetti();
    initGame();
  </script>
</body>
</html>
