<style>
#hs-container{width:100%;max-width:none;margin:0;box-sizing:border-box;background:#B0E6EA;padding:16px;border-radius:8px}
#hs-stage{position:relative;width:100%;aspect-ratio:16/9;height:auto;min-height:360px;border-radius:8px;overflow:hidden;cursor:none}
#bg{width:100%;height:auto;display:block;object-fit:contain}
#fl{position:absolute;inset:0;pointer-events:none;transition:opacity .2s;background-color:#09788b;mix-blend-mode:multiply}

.hs{position:absolute;border-radius:50%;transform:translate(-50%,-50%);transition:all .2s;background:transparent;pointer-events:none}
#fl-icon{position:absolute;width:96px;height:96px;pointer-events:none;z-index:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));transition:left 75ms ease-out,top 75ms ease-out}
.hs.fd{background:rgba(16,185,129,.4);border:2px solid #10b981}
#pr{position:absolute;top:16px;right:16px;background:#06b6d4;color:#fff;padding:8px 16px;border-radius:20px;font-size:14px;font-weight:600}
.md{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999}
.md.hide{display:none}
.mc{background:#fff;padding:24px;border-radius:12px;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mc p{margin:0 0 16px;font-size:18px;line-height:1.5}
#fb-t{font-family:Noto Sans, sans-serif;color:#077488}
#ic-t{font-family:Open Sans;color:#a5125c}
#dn-t{font-family:Noto Sans, sans-serif;color:#077488}
.mc button{width:100%;padding:12px;background:#06b6d4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;transition:background .2s}
.mc button:hover{opacity:0.9}
@media(max-width:640px){.hs{width:50px!important;height:50px!important}#pr{font-size:12px;padding:6px 12px}}
</style>

<script>
let fd=new Set(),tot=5,pend=false;
const st=document.getElementById('hs-stage'),fl=document.getElementById("fl");

var lx=0,ly=0,flIcon=document.getElementById('fl-icon');
st.addEventListener('mousemove',e=>{const r=st.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;lx=x;ly=y;fl.style.mask='radial-gradient(circle 100px at '+(x+40)+'px '+(y-75)+'px,transparent 0%,black 100%)';fl.style.webkitMask='radial-gradient(circle 100px at '+(x+40)+'px '+(y-75)+'px,transparent 0%,black 100%)';if(flIcon){flIcon.style.display='block';flIcon.style.left=x+'px';flIcon.style.top=y+'px';flIcon.style.transform='translate(-50%,-50%)';}});
st.addEventListener('mouseleave',function(){if(flIcon)flIcon.style.display='none';});




st.addEventListener('click',function(e){
  var r=st.getBoundingClientRect(),lxP=(lx+40)/r.width*100,lyP=(ly-75)/r.height*100,lrP=100/r.width*100;
  var hit=null;
  document.querySelectorAll('.hs').forEach(function(h){
    var hx=parseFloat(h.style.left),hy=parseFloat(h.style.top),hsz=parseInt(h.style.width)/r.width*100/2;
    var dx=lxP-hx,dy=lyP-hy,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<lrP+hsz)hit=h;
  });
  if(hit){
    var id=hit.dataset.i,ok=hit.dataset.c==='true',ms=hit.dataset.m;
    document.getElementById('fb-t').textContent=ms;
    document.getElementById('fb').classList.remove('hide');
    if(ok&&!fd.has(id)){fd.add(id);hit.classList.add('fd');document.getElementById('pr').textContent=fd.size+' / '+tot;if(fd.size===tot)pend=true;}
  }else{document.getElementById('ic-t').textContent='I\'m a gentle sea creature.  Try again. ';document.getElementById('ic').classList.remove('hide');}
});

document.getElementById('fb').addEventListener('click',function(e){
  if(e.target.tagName==='BUTTON'||e.target.id==='fb'){
    cls('fb');
    if(pend){
      setTimeout(function(){
        document.getElementById('dn-t').textContent='Congratulations! You found all the hotspots!';
        document.getElementById('dn').classList.remove('hide');
        pend=false;
      },500);
    }
  }
});

function cls(id){document.getElementById(id).classList.add('hide');}
function rst(){fd.clear();document.querySelectorAll('.hs').forEach(function(h){h.classList.remove('fd');});document.getElementById('pr').textContent='0 / '+tot;cls('dn');}
</script>
