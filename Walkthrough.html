"Select one of the quick design categories to jumpstart your project.","context":"These are Canva’s fastest shortcuts.","hint":"The row of colorful circular icons like Presentation, Social media, and Video.","correctText":"Correct!","incorrectText":"Try again.","hotspot":{"xPct":0.17184503260452627,"yPct":0.2879581151832461,"wPct":0.6628308400460299,"hPct":0.12565445026178007}},{"title":"Browse Canva Templates","instruction":"Scroll the template gallery to explore ready made designs.","context":"Great designs often start with a template.","hint":"The “Explore templates” horizontal carousel.","correctText":"Correct!","incorrectText":"Try again.","hotspot":{"xPct":0.04418872266973533,"yPct":0.418848167539267,"wPct":0.9402378212504795,"hPct":0.2146596858638743},"markerOverride":{"markerType":"outline-box","markerThickness":4,"markerOpacity":1}},{"title":"Open a Canva Template","instruction":"Click any template card to open it in the Canva editor.","context":"One click takes you straight into editing.","hint":"The “Templates picked for you” section with large preview cards.","correctText":"Correct!","incorrectText":"Try again.","hotspot":{"xPct":0.03682393555811277,"yPct":0.6492146596858639,"wPct":0.9304181051016494,"hPct":0.3507853403141361},"markerOverride":{"markerType":"pulsing-dot","markerOpacity":0.21}}]}</script>
<script>
(function(){
var P="walkthrough_gn0hs5",root=document.getElementById(P),cfg=JSON.parse(document.getElementById(P+"_cfg").textContent);
var cur=0,tot=cfg.steps.length,done=false;
var wrap=root.querySelector(".ws-img-wrap"),img=wrap.querySelector("img"),fb=wrap.querySelector(".ws-fb"),bar=root.querySelector(".ws-prog-bar");
var pnl=root.querySelector(".ws-pnl"),pSn=pnl.querySelector(".ws-sn"),pTt=pnl.querySelector(".ws-tt"),pIns=pnl.querySelector(".ws-ins"),pHt=pnl.querySelector(".ws-ht"),pNxt=pnl.querySelector(".ws-nxt");
var mk=cfg.theme.marker,ft;
var noOpacity={"outline-box":1,"arrow-right":1,"arrow-left":1,"arrow-up":1,"arrow-down":1,"ring":1};
img.src=cfg.imageDataUrl;
root.querySelector(".ws-rst").onclick=function(){cur=0;done=false;render()};
function esc(t){var d=document.createElement("div");d.textContent=t;return d.innerHTML}
function clearMarkers(){wrap.querySelectorAll(".ws-marker").forEach(function(m){m.remove()})}
function clearCtxPopup(){var p=wrap.querySelector(".ws-ctx-popup");if(p)p.remove();var o=wrap.querySelector(".ws-overlay");if(o)o.remove()}
function addRectBadge(h,color,idx){
if(!mk.showStepBadge)return;
var b=document.createElement("span");b.className="ws-badge ws-marker";
b.style.cssText="background:"+color+";left:"+((h.xPct+h.wPct/2)*100)+"%;top:"+h.yPct*100+"%;transform:translate(-50%, calc(-100% - 12px));white-space:nowrap";
b.textContent=idx+1;wrap.appendChild(b)
}
function drawMarker(s,idx){
clearMarkers();
var h=s.hotspot;if(!h)return;
var ov=s.markerOverride||{};
var mt=ov.markerType?ov.markerType:mk.markerType;
var mc=ov.markerColor?ov.markerColor:mk.markerColor;
var mo=noOpacity[mt]?1:(ov.markerOpacity!=null?ov.markerOpacity:mk.markerOpacity);
var mth=Math.round((ov.markerThickness!=null?ov.markerThickness:(mk.markerThickness||3))*1.2);
var el=document.createElement("div");el.className="ws-marker";
var cx=(h.xPct+h.wPct/2)*100,cy=(h.yPct+h.hPct/2)*100;
if(mt==="outline-box"){el.style.cssText="left:"+h.xPct*100+"%;top:"+h.yPct*100+"%;width:"+h.wPct*100+"%;height:"+h.hPct*100+"%;border:"+mth+"px solid "+mc+";border-radius:4px;opacity:"+mo}
else if(mt==="soft-highlight"){el.style.cssText="left:"+h.xPct*100+"%;top:"+h.yPct*100+"%;width:"+h.wPct*100+"%;height:"+h.hPct*100+"%;background:"+mc+";border-radius:4px;opacity:"+mo}
else if(mt==="pulsing-dot"){el.style.cssText="left:"+h.xPct*100+"%;top:"+h.yPct*100+"%;width:"+h.wPct*100+"%;height:"+h.hPct*100+"%;background:"+mc+";border-radius:50%;opacity:"+mo+";animation:"+P+"_mp 2s infinite"}
else if(mt==="ring"){el.style.cssText="left:"+h.xPct*100+"%;top:"+h.yPct*100+"%;width:"+h.wPct*100+"%;height:"+h.hPct*100+"%;border:"+mth+"px solid "+mc+";border-radius:50%;opacity:"+mo+";animation:"+P+"_mp 2s infinite"}
else if(mt.indexOf("arrow")===0){var asf=1.2;var al=Math.round((ov.arrowLength!=null?ov.arrowLength:mk.arrowLength||40)*asf),aw=Math.round((ov.arrowWidth!=null?ov.arrowWidth:mk.arrowWidth||40)*asf),dir=mt.replace("arrow-",""),ax,ay,rot;
if(dir==="right"){ax="calc("+h.xPct*100+"% - "+al/2+"px)";ay=cy+"%";rot=0}
else if(dir==="left"){ax="calc("+(h.xPct+h.wPct)*100+"% + "+al/2+"px)";ay=cy+"%";rot=180}
else if(dir==="down"){ax=cx+"%";ay="calc("+h.yPct*100+"% - "+al/2+"px)";rot=90}
else{ax=cx+"%";ay="calc("+(h.yPct+h.hPct)*100+"% + "+al/2+"px)";rot=-90}
el.style.cssText="left:"+ax+";top:"+ay+";transform:translate(-50%,-50%) rotate("+rot+"deg);opacity:"+mo;
el.innerHTML='<svg width="'+al+'" height="'+aw+'" viewBox="0 0 100 '+aw+'" fill="none"><line x1="0" y1="'+(aw/2)+'" x2="70" y2="'+(aw/2)+'" stroke="'+mc+'" stroke-width="'+mth+'" stroke-linecap="round"/><polygon points="65,'+(aw/2-mth*2)+' 100,'+(aw/2)+' 65,'+(aw/2+mth*2)+'" fill="'+mc+'"/></svg>';
if(mk.showStepBadge){var b=document.createElement("span");b.className="ws-badge";b.style.cssText="background:"+mc+";top:-12px;left:50%;transform:translate(-50%, -100%) rotate("+(-rot)+"deg);white-space:nowrap";b.textContent=idx+1;el.appendChild(b)}}
wrap.appendChild(el);
if(mt!=="arrow-right"&&mt!=="arrow-left"&&mt!=="arrow-up"&&mt!=="arrow-down"){addRectBadge(h,mc,idx)}
}
var solved=false;
function render(){
bar.style.width=(done?100:(cur/tot)*100)+"%";
solved=false;
clearCtxPopup();
pHt.style.display="none";
pNxt.className="ws-nxt";
if(done){
clearMarkers();
pnl.style.display="none";
var ov=document.createElement("div");ov.className="ws-overlay";
ov.innerHTML='<div class="ws-overlay-card"><div class="ws-emoji">\u{1F389}</div><h3>Complete!</h3><p>All '+tot+' steps done.</p><button class="ws-rbtn">Restart</button></div>';
ov.querySelector(".ws-rbtn").onclick=function(e){e.stopPropagation();cur=0;done=false;render()};
wrap.appendChild(ov);
return}
pnl.style.display="flex";
var s=cfg.steps[cur];
drawMarker(s,cur);
pSn.textContent="Step "+(cur+1)+" of "+tot;
pTt.textContent=s.title;
pIns.textContent=s.instruction||"";
pIns.style.display=s.instruction?"block":"none";
pHt.textContent=s.hint?"\u{1F4A1} "+s.hint:"";
pNxt.textContent=cur<tot-1?"Next \u2192":"Finish \u2713";
}
function sfb(t,c){clearTimeout(ft);fb.textContent=t;fb.className="ws-fb v "+c;ft=setTimeout(function(){fb.className="ws-fb"},2000)}
function showSolved(){
solved=true;
pNxt.classList.add("v");
pHt.style.display="none";
var s=cfg.steps[cur];
if(s.context&&s.hotspot){
var popup=document.createElement("div");popup.className="ws-ctx-popup v";
var h=s.hotspot;
var cxPct=(h.xPct+h.wPct/2);
var placeRight=cxPct<0.5;
var leftPct=placeRight?(h.xPct+h.wPct)*100+3:Math.max(0,h.xPct*100-40-3);
var topPct=Math.max(2,Math.min((h.yPct+h.hPct/2)*100-12,70));
popup.style.left=leftPct+"%";popup.style.top=topPct+"%";
popup.innerHTML='<div class="ws-ctx-inner">'+esc(s.context)+'</div>';
wrap.appendChild(popup);
}
}
wrap.addEventListener("click",function(e){
if(done||solved)return;var s=cfg.steps[cur];if(!s.hotspot)return;
var r=img.getBoundingClientRect(),x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height,h=s.hotspot;
if(x>=h.xPct&&x<=h.xPct+h.wPct&&y>=h.yPct&&y<=h.yPct+h.hPct){sfb(s.correctText||"Correct!","ok");showSolved()}
else{sfb(s.incorrectText||"Try again.","no");if(s.hint)pHt.style.display="block"}
});
pNxt.onclick=function(e){e.stopPropagation();if(!solved)return;if(cur<tot-1){cur++;render()}else{done=true;render()}};
render();
})();
</script>
</div>
