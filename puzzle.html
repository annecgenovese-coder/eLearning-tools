<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puzzle</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap">
<style>
:root{
  --puz-accent:#A00056;
  --puz-bg:#d8e7f8;
  --puz-text:#a00056;
  --puz-card:#ffffff;
  --puz-border:#E5E5EA;
  --puz-font:'Poppins', sans-serif;
  --puz-size:16px;
  --puz-pad:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--puz-bg);font-family:var(--puz-font);color:var(--puz-text);font-size:clamp(13px,2vw,var(--puz-size));padding:clamp(8px,2vw,24px)}
#puz-wrap{width:100%;max-width:960px;margin:0 auto;background:var(--puz-card);border:1px solid var(--puz-border);border-radius:16px;padding:var(--puz-pad)}
#puz-layout{display:flex;gap:16px;width:100%}
#puz-grid-panel{flex:0 0 74%;min-width:0}
#puz-tray-panel{flex:0 0 24%}
#puz-grid-panel .puz-card{width:100%}
.puz-card{background:var(--puz-card);border:1px solid var(--puz-border);border-radius:14px;padding:clamp(6px,1.5vw,14px);margin-bottom:0}
.puz-head{display:flex;justify-content:space-between;align-items:center;font-weight:800;margin-bottom:clamp(4px,1vw,10px);font-size:clamp(12px,2vw,16px)}
#puz-board{position:relative;width:100%;aspect-ratio:960 / 1260;border-radius:14px;overflow:hidden;background:var(--puz-card);cursor:default}
#puz-hint{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.18;pointer-events:none}
#puz-cells{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr)}
.puz-cell{position:relative;overflow:visible}
.puz-cell .placed-piece{position:absolute;background-size:100% 100%}
#puz-tray{display:grid;grid-template-columns:1fr 1fr;gap:8px;border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:clamp(4px,1vw,10px);min-height:80px;overflow-y:auto;max-height:500px;background:#fff;align-content:start}
.puz-slot{position:relative;width:100%;background-size:contain;background-repeat:no-repeat;background-position:center;flex-shrink:0}
#puz-zoom-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.5);color:#fff;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700;pointer-events:none;display:none}
#puz-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);align-items:center;justify-content:center;cursor:pointer}
#puz-overlay img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px;cursor:default}
#puz-overlay-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.2);border:none;border-radius:50%;width:40px;height:40px;font-size:22px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.puz-piece{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center;cursor:grab;user-select:none;filter:drop-shadow(1px 2px 3px rgba(0,0,0,0.25))}
.puz-btn{border:1px solid var(--puz-border);background:#fff;border-radius:999px;padding:clamp(6px,1vw,10px) clamp(8px,1.2vw,12px);cursor:pointer;font-weight:700;font-size:clamp(11px,1.8vw,14px)}
.puz-btn.primary{border-color:rgba(160,0,88,.35);background:rgba(160,0,88,.08);color:var(--puz-accent)}
#puz-status{font-weight:900;color:var(--puz-accent)}
.puz-footer{margin-top:10px;font-size:clamp(10px,1.5vw,12px);opacity:.8}
.puz-footer a{text-decoration:none}
.puz-footer a:hover{text-decoration:underline}
@media(max-width:500px){#puz-layout{flex-direction:column}#puz-grid-panel{flex:none;width:100%}#puz-tray-panel{flex:none;width:100%}#puz-tray{grid-template-columns:1fr 1fr;max-height:300px}}
</style>
</head>
<body>
<div id="puz-wrap">


<p style="margin-bottom:12px;opacity:.85;font-size:.95em">Drag tiles into the grid. Tiles only snap when correct.</p>
<div id="puz-layout">
<div id="puz-grid-panel">
<div class="puz-card">
<div class="puz-head"><span>Puzzle Grid</span><span id="puz-grid-status"></span></div>
<div id="puz-board"><img id="puz-hint" src="" alt=""><div id="puz-cells"></div><div id="puz-zoom-badge">🔍 Click to zoom</div></div>
</div>
</div>
<div id="puz-tray-panel">
<div class="puz-card">
<div class="puz-head"><span>Piece Tray</span><span id="puz-counter"></span></div>
<div id="puz-tray"></div>
<div style="margin-top:10px;display:flex;gap:10px;align-items:center"><button class="puz-btn primary" onclick="resetPuzzle()">Reset</button><span id="puz-status"></span></div>
</div>
</div>
</div>
<div class="puz-footer">Built by <a href="https://elearningdesign.org" target="_blank" rel="noopener" style="color:inherit">eLearningDesign.org</a></div>
</div>
<div id="puz-overlay" onclick="closeOverlay()"><button id="puz-overlay-close" onclick="event.stopPropagation();closeOverlay()">✕</button><img id="puz-overlay-img" src="" alt="Puzzle complete" onclick="event.stopPropagation()"></div>

function drawJE(ctx,x1,y1,x2,y2,t,ts){if(!t){ctx.lineTo(x2,y2);return}var dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy),nx=dy/len*t,ny=-dx/len*t;function ex(f){return x1+dx*f}function ey(f){return y1+dy*f}ctx.lineTo(ex(.34),ey(.34));ctx.bezierCurveTo(ex(.35)+nx*ts*.05,ey(.35)+ny*ts*.05,ex(.37)-nx*ts*.12,ey(.37)-ny*ts*.12,ex(.38)-nx*ts*.08,ey(.38)-ny*ts*.08);ctx.bezierCurveTo(ex(.39)+nx*ts*.5,ey(.39)+ny*ts*.5,ex(.42)+nx*ts*.95,ey(.42)+ny*ts*.95,ex(.5)+nx*ts,ey(.5)+ny*ts);ctx.bezierCurveTo(ex(.58)+nx*ts*.95,ey(.58)+ny*ts*.95,ex(.61)+nx*ts*.5,ey(.61)+ny*ts*.5,ex(.62)-nx*ts*.08,ey(.62)-ny*ts*.08);ctx.bezierCurveTo(ex(.63)-nx*ts*.12,ey(.63)-ny*ts*.12,ex(.65)+nx*ts*.05,ey(.65)+ny*ts*.05,ex(.66),ey(.66));ctx.lineTo(x2,y2)}

function slice(src,cb){var im=new Image();im.onload=function(){var c=document.createElement("canvas");c.width=CW;c.height=CH;var cx=c.getContext("2d");cx.drawImage(im,0,0,CW,CH);var tw=Math.floor(CW/cols),th=Math.floor(CH/rows);var t=document.createElement("canvas");t.width=tw;t.height=th;var tx=t.getContext("2d");var urls=[];for(var r=0;r<rows;r++)for(var cl=0;cl<cols;cl++){tx.clearRect(0,0,tw,th);tx.drawImage(c,cl*tw,r*th,tw,th,0,0,tw,th);urls.push(t.toDataURL("image/png"))}cb(urls)};im.src=src}
function sliceJig(src,cb){var im=new Image();im.onload=function(){var c=document.createElement("canvas");c.width=CW;c.height=CH;var cx=c.getContext("2d");cx.drawImage(im,0,0,CW,CH);var tw=Math.floor(CW/cols),th=Math.floor(CH/rows),ts=Math.floor(Math.min(tw,th)*.14),pw=tw+2*ts,ph=th+2*ts;var tiles=[],outlines=[];for(var r=0;r<rows;r++)for(var cl=0;cl<cols;cl++){var edges=getEdges(r,cl);var pc=document.createElement("canvas");pc.width=pw;pc.height=ph;var pctx=pc.getContext("2d");pctx.save();drawJP(pctx,ts,ts,tw,th,edges,ts);pctx.clip();pctx.drawImage(c,0,0,CW,CH,ts-cl*tw,ts-r*th,CW,CH);pctx.restore();pctx.save();drawJP(pctx,ts,ts,tw,th,edges,ts);pctx.strokeStyle="rgba(0,0,0,0.15)";pctx.lineWidth=1.5;pctx.stroke();pctx.restore();tiles.push(pc.toDataURL("image/png"));var oc=document.createElement("canvas");oc.width=pw;oc.height=ph;var octx=oc.getContext("2d");drawJP(octx,ts,ts,tw,th,edges,ts);octx.fillStyle="rgba(0,0,0,0.04)";octx.fill();octx.strokeStyle="rgba(0,0,0,0.18)";octx.lineWidth=1.5;octx.stroke();outlines.push(oc.toDataURL("image/png"))}cb(tiles,outlines)};im.src=src}
function tryPlace(id,idx){var p=pieces.find(function(x){return x.id===id});if(!p||p.placed||p.ci!==idx)return;p.placed=true;placed++;var tw=Math.floor(CW/cols),th=Math.floor(CH/rows),ts=Math.floor(Math.min(tw,th)*.14);var ovX=(ts/tw)*100,ovY=(ts/th)*100;var cells=document.getElementById("puz-cells");var d=cells.children[idx];var el=document.createElement("div");el.className="placed-piece";el.style.top="-"+ovY+"%";el.style.left="-"+ovX+"%";el.style.width=(100+2*ovX)+"%";el.style.height=(100+2*ovY)+"%";el.style.backgroundImage="url('"+p.ju+"')";d.appendChild(el);render()}
function cellFromTouch(e){var t=e.changedTouches[0];var cells=document.getElementById("puz-cells");var ch=cells.children;for(var i=0;i<ch.length;i++){var r=ch[i].getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)return i}return-1}
function render(){var tray=document.getElementById("puz-tray");tray.innerHTML="";var tw=Math.floor(CW/cols),th=Math.floor(CH/rows);pieces.forEach(function(p){var slot=document.createElement("div");slot.className="puz-slot";slot.style.width="100%";slot.style.aspectRatio=tw+"/"+th;slot.style.backgroundImage="url('"+p.outline+"')";if(!p.placed){var d=document.createElement("div");d.className="puz-piece";d.style.backgroundImage="url('"+p.ju+"')";d.setAttribute("draggable","true");d.addEventListener("dragstart",function(e){e.dataTransfer.setData("text/plain",p.id);e.dataTransfer.effectAllowed="move"});d.addEventListener("touchstart",function(e){e.preventDefault();dragId=p.id;d.style.opacity="0.5"},{passive:false});d.addEventListener("touchend",function(e){e.preventDefault();d.style.opacity="1";if(!dragId)return;var idx=cellFromTouch(e);if(idx>=0)tryPlace(dragId,idx);dragId=null},{passive:false});d.addEventListener("touchmove",function(e){e.preventDefault()},{passive:false});slot.appendChild(d)}tray.appendChild(slot)});if(CFG.showProgress){var c=document.getElementById("puz-counter");if(c)c.textContent=placed+" / "+total}var gs=document.getElementById("puz-grid-status");if(gs)gs.textContent=placed===total?"Complete":"";if(CFG.showReset){var s=document.getElementById("puz-status");if(s)s.textContent=placed===total?"Complete":""}var badge=document.getElementById("puz-zoom-badge");var board=document.getElementById("puz-board");if(placed===total&&total>0){if(badge)badge.style.display="block";board.style.cursor="pointer";board.onclick=function(){openOverlay()}}else{if(badge)badge.style.display="none";board.style.cursor="default";board.onclick=null}}
function openOverlay(){var ov=document.getElementById("puz-overlay");var img=document.getElementById("puz-overlay-img");if(ov&&img){img.src=CFG.img;ov.style.display="flex"}}
function closeOverlay(){var ov=document.getElementById("puz-overlay");if(ov)ov.style.display="none"}
function buildBoard(){var cells=document.getElementById("puz-cells");cells.innerHTML="";for(var i=0;i<total;i++){(function(idx){var d=document.createElement("div");d.className="puz-cell";d.addEventListener("dragover",function(e){e.preventDefault();e.dataTransfer.dropEffect="move"});d.addEventListener("drop",function(e){e.preventDefault();var id=e.dataTransfer.getData("text/plain");tryPlace(id,idx)});cells.appendChild(d)})(i)}}
function resetPuzzle(){placed=0;dragId=null;slice(CFG.img,function(urls){sliceJig(CFG.img,function(jurls,outlines){pieces=shuffle(urls.map(function(u,i){return{id:"p"+i+"_"+Math.random(),url:u,ju:jurls[i],outline:outlines[i],ci:i,placed:false}}));var cells=document.getElementById("puz-cells");for(var i=0;i<cells.children.length;i++){var cell=cells.children[i];cell.innerHTML=""}render()})})}
if(CFG.showHint){var h=document.getElementById("puz-hint");if(h)h.src=CFG.img}
slice(CFG.img,function(urls){sliceJig(CFG.img,function(jurls,outlines){pieces=shuffle(urls.map(function(u,i){return{id:"p"+i+"_"+Math.random(),url:u,ju:jurls[i],outline:outlines[i],ci:i,placed:false}}));buildBoard();render()})});
</script>
