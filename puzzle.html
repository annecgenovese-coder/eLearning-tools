<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Largest Mammals Size Comparison</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap">
<style>
:root{
  --puz-accent:#A00056;
  --puz-bg:#e1eef8;
  --puz-text:#333333;
  --puz-card:#ffffff;
  --puz-border:#E5E5EA;
  --puz-font:'Poppins', sans-serif;
  --puz-size:16px;
  --puz-pad:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--puz-bg);font-family:var(--puz-font);color:var(--puz-text);font-size:var(--puz-size);padding:24px}
#puz-wrap{max-width:1100px;margin:0 auto;background:var(--puz-card);border:1px solid var(--puz-border);border-radius:16px;padding:var(--puz-pad);min-height:900px}
#puz-layout{display:flex;gap:16px;align-items:stretch;height:calc(100vh - 140px);min-height:500px}
#puz-grid-panel{flex:1 1 62%;min-width:0;display:flex;align-items:center}
#puz-tray-panel{flex:0 0 35%;max-width:35%;display:flex;flex-direction:column}
#puz-grid-panel .puz-card{width:100%}
.puz-card{background:var(--puz-card);border:1px solid var(--puz-border);border-radius:14px;padding:14px;margin-bottom:0}
.puz-head{display:flex;justify-content:space-between;align-items:center;font-weight:800;margin-bottom:10px}
#puz-board{position:relative;width:100%;aspect-ratio:960 / 863;border-radius:14px;overflow:hidden;background:var(--puz-card)}
#puz-hint{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.18;pointer-events:none}
#puz-cells{position:absolute;inset:0;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(3,1fr)}
.puz-cell{position:relative;overflow:visible}
.puz-cell .placed-piece{position:absolute;background-size:100% 100%}
#puz-tray{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:10px;min-height:80px;flex:1;overflow-y:auto;background:#fff;align-content:start}
.puz-slot{position:relative;background-size:contain;background-repeat:no-repeat;background-position:center;flex-shrink:0}
.puz-piece{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center;cursor:grab;user-select:none;filter:drop-shadow(1px 2px 3px rgba(0,0,0,0.25))}
.puz-btn{border:1px solid var(--puz-border);background:#fff;border-radius:999px;padding:10px 12px;cursor:pointer;font-weight:700}
.puz-btn.primary{border-color:rgba(160,0,88,.35);background:rgba(160,0,88,.08);color:var(--puz-accent)}
#puz-status{font-weight:900;color:var(--puz-accent)}
.puz-footer{margin-top:10px;font-size:12px;opacity:.8}
.puz-footer a{text-decoration:none}
.puz-footer a:hover{text-decoration:underline}
@media(max-width:700px){#puz-layout{flex-direction:column;height:auto}#puz-tray-panel{flex:none;width:100%}#puz-tray{grid-template-columns:repeat(3,1fr);max-height:300px}}
</style>
</head>

<div id="puz-wrap">
<h2 style="font-family:'Poppins', sans-serif;font-size:31px;color:#29a8d3;font-weight:800;margin-bottom:4px;text-align:center">Largest Mammals Size Comparison</h2>
<p style="font-family:'Poppins', sans-serif;font-size:20px;color:#17549a;margin-bottom:12px;opacity:.85;text-align:center">These large mammals exhibit remarkable size and play vital ecological  roles within their respective habitats.</p>

function tryPlace(id,idx){var p=pieces.find(function(x){return x.id===id});if(!p||p.placed||p.ci!==idx)return;p.placed=true;placed++;var tw=Math.floor(CW/cols),th=Math.floor(CH/rows),ts=Math.floor(Math.min(tw,th)*.14);var ovX=(ts/tw)*100,ovY=(ts/th)*100;var cells=document.getElementById("puz-cells");var d=cells.children[idx];var el=document.createElement("div");el.className="placed-piece";el.style.top="-"+ovY+"%";el.style.left="-"+ovX+"%";el.style.width=(100+2*ovX)+"%";el.style.height=(100+2*ovY)+"%";el.style.backgroundImage="url('"+p.ju+"')";d.appendChild(el);render()}
function cellFromTouch(e){var t=e.changedTouches[0];var cells=document.getElementById("puz-cells");var ch=cells.children;for(var i=0;i<ch.length;i++){var r=ch[i].getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)return i}return-1}
function render(){var tray=document.getElementById("puz-tray");tray.innerHTML="";var tw=Math.floor(CW/cols),th=Math.floor(CH/rows);pieces.forEach(function(p){var slot=document.createElement("div");slot.className="puz-slot";slot.style.width="100%";slot.style.aspectRatio=tw+"/"+th;slot.style.backgroundImage="url('"+p.outline+"')";if(!p.placed){var d=document.createElement("div");d.className="puz-piece";d.style.backgroundImage="url('"+p.ju+"')";d.setAttribute("draggable","true");d.addEventListener("dragstart",function(e){e.dataTransfer.setData("text/plain",p.id);e.dataTransfer.effectAllowed="move"});d.addEventListener("touchstart",function(e){e.preventDefault();dragId=p.id;d.style.opacity="0.5"},{passive:false});d.addEventListener("touchend",function(e){e.preventDefault();d.style.opacity="1";if(!dragId)return;var idx=cellFromTouch(e);if(idx>=0)tryPlace(dragId,idx);dragId=null},{passive:false});d.addEventListener("touchmove",function(e){e.preventDefault()},{passive:false});slot.appendChild(d)}tray.appendChild(slot)});if(CFG.showProgress){var c=document.getElementById("puz-counter");if(c)c.textContent=placed+" / "+total}var gs=document.getElementById("puz-grid-status");if(gs)gs.textContent=placed===total?"Complete":"";if(CFG.showReset){var s=document.getElementById("puz-status");if(s)s.textContent=placed===total?"Complete":""}}
function buildBoard(){var cells=document.getElementById("puz-cells");cells.innerHTML="";for(var i=0;i<total;i++){(function(idx){var d=document.createElement("div");d.className="puz-cell";d.addEventListener("dragover",function(e){e.preventDefault();e.dataTransfer.dropEffect="move"});d.addEventListener("drop",function(e){e.preventDefault();var id=e.dataTransfer.getData("text/plain");tryPlace(id,idx)});cells.appendChild(d)})(i)}}
function resetPuzzle(){placed=0;dragId=null;slice(CFG.img,function(urls){sliceJig(CFG.img,function(jurls,outlines){pieces=shuffle(urls.map(function(u,i){return{id:"p"+i+"_"+Math.random(),url:u,ju:jurls[i],outline:outlines[i],ci:i,placed:false}}));var cells=document.getElementById("puz-cells");for(var i=0;i<cells.children.length;i++){var cell=cells.children[i];cell.innerHTML=""}render()})})}
if(CFG.showHint){var h=document.getElementById("puz-hint");if(h)h.src=CFG.img}
slice(CFG.img,function(urls){sliceJig(CFG.img,function(jurls,outlines){pieces=shuffle(urls.map(function(u,i){return{id:"p"+i+"_"+Math.random(),url:u,ju:jurls[i],outline:outlines[i],ci:i,placed:false}}));buildBoard();render()})});
</script>
