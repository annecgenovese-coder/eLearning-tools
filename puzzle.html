<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Puzzle</title>
<style>
:root{
  --puz-accent:#a00058;
  --puz-bg:#b0e6ea;
  --puz-text:#0f172a;
  --puz-card:#ffffff;
  --puz-border:rgba(0,0,0,0.12);
  --puz-font:'Poppins', system-ui, sans-serif;
  --puz-size:16px;
  --puz-pad:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--puz-bg);font-family:var(--puz-font);color:var(--puz-text);font-size:var(--puz-size);padding:24px}
#puz-wrap{max-width:960px;margin:0 auto;background:var(--puz-card);border:1px solid var(--puz-border);border-radius:16px;padding:var(--puz-pad);min-height:900px}
.puz-card{background:var(--puz-card);border:1px solid var(--puz-border);border-radius:14px;padding:14px;margin-bottom:14px}
.puz-head{display:flex;justify-content:space-between;align-items:center;font-weight:800;margin-bottom:10px}
#puz-board{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#fff;border:1px dashed rgba(0,0,0,.18)}
#puz-hint{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.18;pointer-events:none}
#puz-cells{position:absolute;inset:0;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(3,1fr)}
.puz-cell{border:1px solid rgba(0,0,0,.08)}
.puz-cell.good{outline:2px solid rgba(34,197,94,.35);outline-offset:-2px}
#puz-tray{display:flex;flex-wrap:wrap;gap:8px;border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:10px;min-height:80px;background:#fff;align-content:start}
.puz-slot{position:relative;background-size:contain;background-repeat:no-repeat;background-position:center;flex-shrink:0}
.puz-piece{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center;cursor:grab;user-select:none;filter:drop-shadow(1px 2px 3px rgba(0,0,0,0.25))}
.puz-btn{border:1px solid var(--puz-border);background:#fff;border-radius:999px;padding:10px 12px;cursor:pointer;font-weight:700}
.puz-btn.primary{border-color:rgba(160,0,88,.35);background:rgba(160,0,88,.08);color:var(--puz-accent)}
#puz-status{font-weight:900;color:var(--puz-accent)}
.puz-footer{margin-top:10px;font-size:12px;opacity:.8}
</style>
</head>
<body>
<div id="puz-wrap">
<h2 style="font-weight:800;margin-bottom:6px">Puzzle</h2>
<p style="margin-bottom:12px;opacity:.85;font-size:.95em">Drag tiles into the grid. Tiles only snap when correct.</p>
<div class="puz-card">
<div class="puz-head"><span>Puzzle Grid</span><span id="puz-grid-status"></span></div>
<div id="puz-board"><img id="puz-hint" src="" alt=""><div id="puz-cells"></div></div>
</div>
<div class="puz-card">
<div class="puz-head"><span>Piece Tray</span><span id="puz-counter"></span></div>
<div id="puz-tray"></div>
<div style="margin-top:10px;display:flex;gap:10px;align-items:center"><button class="puz-btn primary" onclick="resetPuzzle()">Reset</button><span id="puz-status"></span></div>
</div>
<div class="puz-footer">Built with eLearningDesign.org</div>
</div>

function sliceJig(src,cb){var im=new Image();im.onload=function(){var c=document.createElement("canvas");c.width=CW;c.height=CH;var cx=c.getContext("2d");cx.drawImage(im,0,0,CW,CH);var tw=Math.floor(CW/cols),th=Math.floor(CH/rows),ts=Math.floor(Math.min(tw,th)*.14),pw=tw+2*ts,ph=th+2*ts;var tiles=[],outlines=[];for(var r=0;r<rows;r++)for(var cl=0;cl<cols;cl++){var edges=getEdges(r,cl);var pc=document.createElement("canvas");pc.width=pw;pc.height=ph;var pctx=pc.getContext("2d");pctx.save();drawJP(pctx,ts,ts,tw,th,edges,ts);pctx.clip();pctx.drawImage(c,0,0,CW,CH,ts-cl*tw,ts-r*th,CW,CH);pctx.restore();pctx.save();drawJP(pctx,ts,ts,tw,th,edges,ts);pctx.strokeStyle="rgba(0,0,0,0.15)";pctx.lineWidth=1.5;pctx.stroke();pctx.restore();tiles.push(pc.toDataURL("image/png"));var oc=document.createElement("canvas");oc.width=pw;oc.height=ph;var octx=oc.getContext("2d");drawJP(octx,ts,ts,tw,th,edges,ts);octx.fillStyle="rgba(0,0,0,0.04)";octx.fill();octx.strokeStyle="rgba(0,0,0,0.18)";octx.lineWidth=1.5;octx.stroke();outlines.push(oc.toDataURL("image/png"))}cb(tiles,outlines)};im.src=src}
function tryPlace(id,idx){var p=pieces.find(function(x){return x.id===id});if(!p||p.placed||p.ci!==idx)return;p.placed=true;placed++;var cells=document.getElementById("puz-cells");var d=cells.children[idx];d.classList.add("good");d.style.backgroundImage="url('"+p.url+"')";d.style.backgroundSize="cover";render()}
function cellFromTouch(e){var t=e.changedTouches[0];var cells=document.getElementById("puz-cells");var ch=cells.children;for(var i=0;i<ch.length;i++){var r=ch[i].getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)return i}return-1}
function render(){var tray=document.getElementById("puz-tray");tray.innerHTML="";var tw=Math.floor(CW/cols),th=Math.floor(CH/rows);var slotW=Math.max(60,Math.floor(800/cols));pieces.forEach(function(p){var slot=document.createElement("div");slot.className="puz-slot";slot.style.width=slotW+"px";slot.style.aspectRatio=tw+"/"+th;slot.style.backgroundImage="url('"+p.outline+"')";if(!p.placed){var d=document.createElement("div");d.className="puz-piece";d.style.backgroundImage="url('"+p.ju+"')";d.setAttribute("draggable","true");d.addEventListener("dragstart",function(e){e.dataTransfer.setData("text/plain",p.id);e.dataTransfer.effectAllowed="move"});d.addEventListener("touchstart",function(e){e.preventDefault();dragId=p.id;d.style.opacity="0.5"},{passive:false});d.addEventListener("touchend",function(e){e.preventDefault();d.style.opacity="1";if(!dragId)return;var idx=cellFromTouch(e);if(idx>=0)tryPlace(dragId,idx);dragId=null},{passive:false});d.addEventListener("touchmove",function(e){e.preventDefault()},{passive:false});slot.appendChild(d)}tray.appendChild(slot)});if(CFG.showProgress){var c=document.getElementById("puz-counter");if(c)c.textContent=placed+" / "+total}var gs=document.getElementById("puz-grid-status");if(gs)gs.textContent=placed===total?"Complete":"";if(CFG.showReset){var s=document.getElementById("puz-status");if(s)s.textContent=placed===total?"Complete":""}}
function buildBoard(){var cells=document.getElementById("puz-cells");cells.innerHTML="";for(var i=0;i<total;i++){(function(idx){var d=document.createElement("div");d.className="puz-cell";d.addEventListener("dragover",function(e){e.preventDefault();e.dataTransfer.dropEffect="move"});d.addEventListener("drop",function(e){e.preventDefault();var id=e.dataTransfer.getData("text/plain");tryPlace(id,idx)});cells.appendChild(d)})(i)}}
function resetPuzzle(){placed=0;dragId=null;slice(CFG.img,function(urls){sliceJig(CFG.img,function(jurls,outlines){pieces=shuffle(urls.map(function(u,i){return{id:"p"+i+"_"+Math.random(),url:u,ju:jurls[i],outline:outlines[i],ci:i,placed:false}}));var cells=document.getElementById("puz-cells");for(var i=0;i<cells.children.length;i++){cells.children[i].classList.remove("good");cells.children[i].style.backgroundImage="none"}render()})})}
if(CFG.showHint){var h=document.getElementById("puz-hint");if(h)h.src=CFG.img}
slice(CFG.img,function(urls){sliceJig(CFG.img,function(jurls,outlines){pieces=shuffle(urls.map(function(u,i){return{id:"p"+i+"_"+Math.random(),url:u,ju:jurls[i],outline:outlines[i],ci:i,placed:false}}));buildBoard();render()})});
</script>
